{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center min-vh-100 text-center px-4">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <h1 class="display-1 fw-bold text-gold">404</h1>
  <h4 class="mb-3">Page Not Found</h4>
  <p class="text-muted mb-4">The page you are looking for does not exist or has been moved.</p>
  <a href="{{ url_for('dashboard') }}" class="btn btn-gold px-4">
    <i class="bi bi-house-fill me-2"></i>Return to Dashboard
  </a>
</div>
{% endblock %}

<!-- ── Booking Overlay ────────────────────────────────────────────────────── -->
<div class="ams-overlay" id="bookingOverlay">
  <div class="ams-dialog" role="dialog" aria-labelledby="bookingTitle">

    <div class="ams-dialog-header">
      <h5 class="ams-dialog-title" id="bookingTitle">
        <i class="bi bi-calendar-plus-fill text-success me-2"></i>
        Book Apartment <span id="bookingAptId" class="text-gold"></span>
      </h5>
      <button class="ams-dialog-close" onclick="closeBookingModal()" title="Close">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <form id="bookingForm" method="POST" action="" enctype="multipart/form-data">
      <div class="ams-dialog-body">
        <p class="text-muted small mb-3">Fill in tenant details to complete the booking</p>

        <div class="row g-3">
          <!-- Name -->
          <div class="col-12 col-md-6">
            <label for="book_name" class="form-label fw-semibold small text-light-muted">
              <i class="bi bi-person-fill me-1 text-gold"></i>Full Name *
            </label>
            <input type="text" class="form-control form-control-glass"
                   id="book_name" name="name" placeholder="e.g. John Doe" required />
          </div>

          <!-- Phone -->
          <div class="col-12 col-md-6">
            <label for="book_phone" class="form-label fw-semibold small text-light-muted">
              <i class="bi bi-telephone-fill me-1 text-gold"></i>Phone Number *
            </label>
            <input type="tel" class="form-control form-control-glass"
                   id="book_phone" name="phone" placeholder="e.g. +880 1700-000000" required />
          </div>

          <!-- Address -->
          <div class="col-12">
            <label for="book_address" class="form-label fw-semibold small text-light-muted">
              <i class="bi bi-geo-alt-fill me-1 text-gold"></i>Home Address *
            </label>
            <textarea class="form-control form-control-glass" id="book_address"
                      name="address" rows="2" placeholder="Full mailing address" required></textarea>
          </div>

          <!-- Profile Picture -->
          <div class="col-12 col-md-6">
            <label for="book_profile_pic" class="form-label fw-semibold small text-light-muted">
              <i class="bi bi-image-fill me-1 text-gold"></i>Profile Photo
              <span class="text-muted">(optional)</span>
            </label>
            <div class="file-upload-area" id="bookPicArea">
              <input type="file" class="file-input" id="book_profile_pic"
                     name="profile_pic" accept="image/*"
                     onchange="previewImage(this, 'bookPicPreview', 'bookPicArea')" />
              <div class="file-upload-content">
                <img id="bookPicPreview" src="" alt="Preview" class="file-preview d-none" />
                <div id="bookPicPlaceholder">
                  <i class="bi bi-cloud-arrow-up fs-3 text-muted"></i>
                  <div class="small text-muted mt-1">Click to upload image</div>
                  <div class="tiny text-muted">PNG, JPG, WEBP up to 16MB</div>
                </div>
              </div>
            </div>
          </div>

          <!-- Document -->
          <div class="col-12 col-md-6">
            <label for="book_document" class="form-label fw-semibold small text-light-muted">
              <i class="bi bi-file-earmark-fill me-1 text-gold"></i>ID Document
              <span class="text-muted">(optional)</span>
            </label>
            <div class="file-upload-area" id="bookDocArea">
              <input type="file" name="document" id="book_document" class="file-input" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" multiple onchange="previewDocument(this, 'bookDocPreview', 'bookDocArea')"/>
              <div class="file-upload-content">
                <div id="bookDocPreview" class="file-doc-preview d-none">
                  <i class="bi bi-file-earmark-check text-success fs-3"></i>
                  <span id="bookDocName" class="small ms-2 text-light"></span>
                </div>
                <div id="bookDocPlaceholder">
                  <i class="bi bi-file-earmark-arrow-up fs-3 text-muted"></i>
                  <div class="small fw-semibold mt-2">Upload Document(s)</div>
                  <div class="text-muted" style="font-size:0.75rem;">PDF, DOC, DOCX, Image (Multiple allowed)</div>
                </div>
              </div>
            </div>
          </div>

          <!-- Pricing -->
          <div class="col-12 col-md-4">
            <label for="book_total_price" class="form-label fw-semibold small text-light-muted">
              <i class="bi bi-cash me-1 text-gold"></i>Total Price
            </label>
            <input type="number" step="0.01" class="form-control form-control-glass"
                   id="book_total_price" name="total_price" value="0" min="0" required
                   oninput="calcDue('book')" />
          </div>
          <div class="col-12 col-md-4">
            <label for="book_booking_money" class="form-label fw-semibold small text-light-muted">
              <i class="bi bi-wallet2 me-1 text-gold"></i>Booking Money
            </label>
            <input type="number" step="0.01" class="form-control form-control-glass"
                   id="book_booking_money" name="booking_money" value="0" min="0" required
                   oninput="calcDue('book')" />
          </div>
          <div class="col-12 col-md-4">
            <label for="book_due_amount" class="form-label fw-semibold small text-light-muted">
              <i class="bi bi-exclamation-circle me-1 text-gold"></i>Due Amount
            </label>
            <input type="number" step="0.01" class="form-control form-control-glass text-warning fw-bold"
                   id="book_due_amount" name="due_amount" value="0" readonly />
          </div>
        </div>
      </div>

      <div class="ams-dialog-footer">
        <button type="button" class="btn btn-outline-secondary" onclick="closeBookingModal()">
          Cancel
        </button>
        <button type="submit" class="btn btn-success fw-semibold px-4" id="bookSubmitBtn">
          <i class="bi bi-check-circle-fill me-1"></i>Confirm Booking
        </button>
      </div>
    </form>

  </div>
</div>

<script>
function calcDue(prefix) {
  const total = parseFloat(document.getElementById(prefix + '_total_price').value) || 0;
  const booked = parseFloat(document.getElementById(prefix + '_booking_money').value) || 0;
  const due = total - booked;
  document.getElementById(prefix + '_due_amount').value = due < 0 ? 0 : due;
}
</script>
